<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码管理后台 · 志愿罗盘</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;padding:30px;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:#f5f1e8;color:#18332e}
    .shell{width:min(1200px,100%);margin:auto}
    h1{font:32px STKaiti,KaiTi,serif;margin:0 0 8px}
    .sub{color:#687a75;font-size:14px;margin:0 0 30px}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
    .stat-card{background:#fffdf8;border:1px solid #dfe3dc;padding:18px 20px;border-radius:8px}
    .stat-card b{font-size:28px;color:#153a34;display:block}
    .stat-card span{font-size:13px;color:#687a75}
    .login-box{max-width:400px;margin:80px auto;background:#fffdf8;border:1px solid #dfe3dc;padding:40px;border-radius:12px}
    .login-box h2{margin:0 0 20px;font:24px STKaiti,KaiTi,serif}
    .login-box input{width:100%;border:1px solid #dfe3dc;padding:12px;font-size:16px;border-radius:6px;margin-bottom:14px}
    .login-box button{width:100%;padding:12px;background:#153a34;color:white;border:0;border-radius:6px;font-size:16px;cursor:pointer}
    .login-box button:hover{background:#205a50}
    .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
    .controls select,.controls input,.controls button{padding:8px 14px;border:1px solid #dfe3dc;border-radius:6px;font-size:14px;background:#fffdf8}
    .controls button{background:#153a34;color:white;border:0;cursor:pointer}
    .controls button:hover{background:#205a50}
    .controls button.danger{background:#b54a3a}
    .controls button.danger:hover{background:#943d2f}
    .controls label{margin-right:16px;font-size:14px;color:#4c625d}
    table{width:100%;border-collapse:collapse;background:#fffdf8;border:1px solid #dfe3dc;font-size:14px}
    th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #dfe3dc}
    th{background:#edf5ef;font-weight:700;color:#4c625d;white-space:nowrap}
    tr:hover{background:#fbfaf4}
    .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600}
    .tag.active{background:#e0f2e8;color:#1b7a5d}
    .tag.exhausted{background:#fce8e4;color:#b54a3a}
    .tag.sold{background:#e3edf5;color:#2a6b8a}
    input.owner-input{padding:4px 8px;border:1px solid #dfe3dc;border-radius:4px;width:100px;font-size:13px}
    .action-btn{padding:4px 10px;border:0;border-radius:4px;cursor:pointer;font-size:12px}
    .action-btn.save{background:#153a34;color:white}
    .action-btn.reset{background:#d99b2b;color:white}
    .action-btn:hover{opacity:.85}
    .pagination{display:flex;gap:8px;align-items:center;margin-top:16px;justify-content:center}
    .pagination button{padding:6px 14px;border:1px solid #dfe3dc;border-radius:4px;background:#fffdf8;cursor:pointer;font-size:13px}
    .pagination button:disabled{opacity:.4;cursor:default}
    .pagination span{font-size:13px;color:#687a75}
    .toast{padding:12px 20px;border-radius:6px;margin-bottom:16px;font-size:14px;display:none}
    .toast.show{display:block}
    .toast.success{background:#e0f2e8;color:#1b7a5d;border:1px solid #bae0ce}
    .toast.error{background:#fce8e4;color:#b54a3a;border:1px solid #f5cdc5}
    .generate-area{display:none;background:#fffdf8;border:1px solid #dfe3dc;padding:20px;border-radius:8px;margin-bottom:20px}
    .generate-area.show{display:block}
    @media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}body{padding:16px}}
    .hidden{display:none!important}
  </style>
</head>
<body>
<div class="shell" id="app">
  <h1>🛡 密码管理后台</h1>
  <p class="sub">志愿罗盘 · 密码充值管理系统</p>

  <div id="toast" class="toast"></div>

  <!-- 登录 -->
  <div id="login-box" class="login-box">
    <h2>管理员登录</h2>
    <p style="font-size:13px;color:#687a75;margin:0 0 16px">请输入管理密码以继续</p>
    <input type="password" id="access-input" placeholder="管理密码" autofocus>
    <button onclick="doLogin()">进入管理后台</button>
  </div>

  <!-- 主界面 -->
  <div id="main-content" class="hidden">
    <div class="stats" id="stats-container"></div>

    <div class="controls">
      <label>筛选：
        <select id="filter-mode" onchange="loadPasswords(1)">
          <option value="all">全部</option>
          <option value="active">有剩余次数</option>
          <option value="exhausted">已用完</option>
          <option value="sold">已售出</option>
          <option value="unsold">未售出</option>
        </select>
      </label>
      <input type="text" id="search-pwd" placeholder="搜索密码..." style="width:140px" oninput="loadPasswords(1)">
      <button onclick="loadPasswords(1)">刷新</button>
      <button onclick="toggleGenerate()">生成新密码</button>
      <button onclick="exportData()">导出备份</button>
      <button onclick="document.getElementById('import-file').click()">导入恢复</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      <button onclick="doLogout()" class="danger">退出</button>
    </div>

    <div id="generate-area" class="generate-area">
      <label>生成数量：<input type="number" id="gen-count" value="500" min="100" max="10000" style="width:100px"></label>
      <button onclick="doGenerate()">确认生成</button>
      <span id="gen-result" style="font-size:13px;color:#687a75;margin-left:12px"></span>
    </div>

    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>密码</th><th>剩余次数</th><th>状态</th><th>购买者</th><th>售出时间</th><th>备注</th><th>操作</th>
        </tr></thead>
        <tbody id="table-body"><tr><td colspan="7" style="text-align:center;color:#687a75">加载中…</td></tr></tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
let ACCESS_TOKEN = '';
let currentPage = 1;

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}

function doLogin() {
  ACCESS_TOKEN = document.getElementById('access-input').value.trim();
  if (!ACCESS_TOKEN) { showToast('请输入管理密码', 'error'); return; }
  loadStats();
  loadPasswords(1);
  document.getElementById('login-box').classList.add('hidden');
  document.getElementById('main-content').classList.remove('hidden');
}

function doLogout() {
  ACCESS_TOKEN = '';
  document.getElementById('main-content').classList.add('hidden');
  document.getElementById('login-box').classList.remove('hidden');
  document.getElementById('access-input').value = '';
}

async function api(url, options = {}) {
  const separator = url.includes('?') ? '&' : '?';
  const resp = await fetch(url + separator + 'access=' + encodeURIComponent(ACCESS_TOKEN), options);
  if (resp.status === 403) {
    showToast('登录已过期，请重新登录', 'error');
    doLogout();
    return null;
  }
  const data = await resp.json();
  if (!resp.ok) { showToast(data.detail || '请求失败', 'error'); return null; }
  return data;
}

async function loadStats() {
  const data = await api('/api/admin/stats');
  if (!data) return;
  document.getElementById('stats-container').innerHTML = `
    <div class="stat-card"><b>${data.total.toLocaleString()}</b><span>密码总数</span></div>
    <div class="stat-card"><b>${data.active.toLocaleString()}</b><span>有效密码（有剩余次数）</span></div>
    <div class="stat-card"><b>${data.exhausted.toLocaleString()}</b><span>已耗尽</span></div>
    <div class="stat-card"><b>${data.sold.toLocaleString()}</b><span>已售出</span></div>
    <div class="stat-card"><b>${data.remaining_all.toLocaleString()}</b><span>剩余总次数</span></div>
  `;
}

async function loadPasswords(page) {
  currentPage = page;
  const filter = document.getElementById('filter-mode').value;
  const search = document.getElementById('search-pwd').value.trim();
  let url = `/api/admin/passwords?page=${page}&page_size=50&filter_mode=${filter}`;
  if (search) url += '&search=' + encodeURIComponent(search);
  const data = await api(url);
  if (!data) return;

  const tbody = document.getElementById('table-body');
  if (data.items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#687a75">无匹配密码</td></tr>';
  } else {
    tbody.innerHTML = data.items.map(item => {
      const statusTag = item.remaining <= 0 ? '<span class="tag exhausted">已用完</span>'
        : '<span class="tag active">有效</span>';
      const soldTag = item.owner ? '<span class="tag sold">已售</span>' : '';
      const ownerVal = item.owner || '';
      const notesVal = item.notes || '';
      return `<tr>
        <td><code style="font-size:16px;letter-spacing:2px">${item.password}</code></td>
        <td><b>${item.remaining}</b>/10</td>
        <td>${statusTag} ${soldTag}</td>
        <td><input class="owner-input" id="owner-${item.password}" value="${ownerVal}" placeholder="购买者"></td>
        <td style="color:#687a75;font-size:12px">${item.sold_at || '-'}</td>
        <td><input class="owner-input" id="notes-${item.password}" value="${notesVal}" placeholder="备注" style="width:120px"></td>
        <td style="white-space:nowrap">
          <button class="action-btn save" onclick="saveOwner('${item.password}')">保存</button>
          <button class="action-btn" style="background:#2a6b8a;color:white" onclick="sellPwd('${item.password}')">售出</button>
          <button class="action-btn reset" onclick="resetPwd('${item.password}')">重置</button>
        </td>
      </tr>`;
    }).join('');
  }

  // Pagination
  const totalPages = Math.ceil(data.total / data.page_size);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let html = `<button onclick="loadPasswords(1)" ${page <= 1 ? 'disabled' : ''}>首页</button>`;
  html += `<button onclick="loadPasswords(${page - 1})" ${page <= 1 ? 'disabled' : ''}>上一页</button>`;
  html += `<span>第 ${page}/${totalPages} 页 · 共 ${data.total} 条</span>`;
  html += `<button onclick="loadPasswords(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页</button>`;
  html += `<button onclick="loadPasswords(${totalPages})" ${page >= totalPages ? 'disabled' : ''}>末页</button>`;
  pag.innerHTML = html;
}

async function saveOwner(password) {
  const owner = document.getElementById(`owner-${password}`).value.trim();
  const notes = document.getElementById(`notes-${password}`).value.trim();
  const data = await api('/api/admin/set-owner?password=' + encodeURIComponent(password)
    + '&owner=' + encodeURIComponent(owner) + '&notes=' + encodeURIComponent(notes), { method: 'POST' });
  if (data) showToast(data.message, 'success');
  loadStats();
}

async function sellPwd(password) {
  const name = prompt('输入购买者名称（如：张三）：');
  if (!name || !name.trim()) return;
  const data = await api('/api/admin/set-owner?password=' + encodeURIComponent(password)
    + '&owner=' + encodeURIComponent(name.trim()), { method: 'POST' });
  if (data) showToast(data.message, 'success');
  loadPasswords(currentPage);
  loadStats();
}

async function resetPwd(password) {
  if (!confirm(`确定重置密码 ${password} 的剩余次数为 10？`)) return;
  const data = await api('/api/admin/reset-password?password=' + encodeURIComponent(password) + '&remaining=10', { method: 'POST' });
  if (data) showToast(data.message, 'success');
  loadPasswords(currentPage);
  loadStats();
}

function toggleGenerate() {
  document.getElementById('generate-area').classList.toggle('show');
}

async function doGenerate() {
  const count = parseInt(document.getElementById('gen-count').value) || 500;
  const data = await api('/api/admin/generate?count=' + count, { method: 'POST' });
  if (data) {
    document.getElementById('gen-result').textContent = `已生成 ${data.generated} 个新密码，当前共 ${data.total} 个`;
    showToast(`成功生成 ${data.generated} 个新密码`, 'success');
    loadPasswords(1);
    loadStats();
  }
}

async function exportData() {
  const data = await api('/api/admin/export');
  if (!data || !data.data) return;
  const blob = new Blob([JSON.stringify(data.data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `passwords_backup_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('备份文件已下载，部署后可通过"导入恢复"还原', 'success');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const data = JSON.parse(e.target.result);
      const resp = await fetch('/api/admin/import?access=' + encodeURIComponent(ACCESS_TOKEN), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data }),
      });
      const result = await resp.json();
      if (result.success) {
        showToast(result.message, 'success');
        loadStats();
        loadPasswords(1);
      } else {
        showToast(result.message || '导入失败', 'error');
      }
    } catch (err) {
      showToast('文件格式错误，请选择有效的 JSON 文件', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Enter key triggers login
document.getElementById('access-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
